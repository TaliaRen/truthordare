<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Truthly</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Truthly" />
  <link rel="shortcut icon" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="apple-touch-icon" href="/icon-180.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #d0d0d0;
      display: flex;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 390px;
      height: 100svh; /* safe small viewport height — excludes browser chrome */
      position: relative;
      overflow: hidden;
      background: #f5f6f7;
      display: flex;
      flex-direction: column;
    }

    /* ── SCREENS ── */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .screen.active { display: flex; }

    /* ── HEADER ── */
    .header {
      flex-shrink: 0;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      background: rgba(245,246,247,0.85);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: clamp(68px, 11vh, 88px);
      z-index: 10;
    }

    .logo {
      font-family: 'Jua', sans-serif;
      font-size: clamp(24px, 4vw, 30px);
      color: #242424;
      letter-spacing: -1.5px;
      user-select: none;
    }

    .icon-btn {
      width: clamp(44px, 8vw, 56px);
      height: clamp(44px, 8vw, 56px);
      border-radius: 9999px;
      background: #ffffff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 24px 40px -10px rgba(44,47,48,0.06);
      flex-shrink: 0;
      transition: transform 0.12s ease, opacity 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { transform: scale(0.93); opacity: 0.85; }
    .icon-btn img { width: 24px; height: 24px; display: block; }
    .header-spacer { width: clamp(44px, 8vw, 56px); flex-shrink: 0; }

    /* ═══════════════════════════════════════
       SCREEN 1
    ═══════════════════════════════════════ */
    #s1 { background: #f5f6f7; }

    .s1-body {
      flex: 1;
      min-height: 0;
      padding: clamp(20px,3.5vh,32px) 24px clamp(16px,2.5vh,32px);
      display: flex;
      flex-direction: column;
      gap: clamp(28px,6vh,60px);
    }

    .hero { display: flex; flex-direction: column; gap: clamp(8px,1.5vh,16px); }

    .hero-title {
      font-weight: 800;
      font-size: clamp(36px,7vw,48px);
      line-height: 1.15;
      color: rgba(49,49,49,0.28);
    }
    .hero-title b { color: #242424; font-weight: 800; }

    .hero-sub {
      font-weight: 500;
      font-size: clamp(15px,2.5vw,18px);
      line-height: 1.55;
      color: #4e4e4e;
    }

    .cards { display: flex; flex-direction: column; gap: clamp(10px,1.8vh,16px); }

    .card-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: clamp(14px,2.2vh,20px) 48px clamp(14px,2.2vh,20px) 24px;
      border-radius: 9999px;
      border: 2px solid;
      background: none;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .card-btn:active { transform: scale(0.97); }

    .card-btn.ice   { background: rgba(141,221,255,0.10); border-color: #8dddff; }
    .card-btn.party { background: rgba(255,197,104,0.10); border-color: #ffc568; }
    .card-btn.deep  { background: rgba(201,165,255,0.10); border-color: #c9a5ff; }

    .card-icon {
      width: clamp(44px,8vw,56px);
      height: clamp(44px,8vw,56px);
      border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ice   .card-icon { background: rgba(26,186,255,0.10); }
    .party .card-icon { background: rgba(255,166,23,0.10); }
    .deep  .card-icon { background: rgba(125,68,209,0.10); }
    .card-icon img { width: 24px; height: 24px; display: block; }

    .card-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }

    .card-name {
      font-weight: 800;
      font-size: clamp(17px,3vw,20px);
      line-height: 1.4;
      letter-spacing: -0.5px;
    }
    .ice   .card-name { color: #1abaff; }
    .party .card-name { color: #ffa617; }
    .deep  .card-name { color: #7d44d1; }

    .card-desc {
      font-weight: 500;
      font-size: 12px;
      line-height: 16px;
      color: #595c5d;
    }

    /* ═══════════════════════════════════════
       SCREEN 2
    ═══════════════════════════════════════ */
    #s2 { background: #f5f6f7; }

    .s2-body {
      flex: 1;
      min-height: 0;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      gap: clamp(40px,8vh,100px);
    }

    .s2-hero { display: flex; flex-direction: column; gap: clamp(10px,1.8vh,16px); }

    .cat-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      border-radius: 9999px;
      border: 1px solid;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      line-height: 16px;
      align-self: flex-start;
    }

    .s2-title {
      font-weight: 800;
      font-size: clamp(32px,6.5vw,48px);
      line-height: 1.15;
      color: rgba(49,49,49,0.28);
    }
    .s2-title b { color: #242424; font-weight: 800; }

    .s2-sub {
      font-weight: 500;
      font-size: clamp(15px,2.5vw,18px);
      line-height: 1.55;
      color: #595c5d;
    }

    .choice-row {
      display: flex;
      gap: 16px;
      align-items: stretch;
    }

    .choice-btn {
      flex: 1;
      height: clamp(180px,28vh,230px);
      border-radius: 24px;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      transition: transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:active { transform: scale(0.96); }

    .choice-btn.truth-btn {
      background: rgba(0,75,226,0.10);
      box-shadow: 0 12px 32px -8px rgba(44,47,48,0.08);
    }
    .choice-btn.dare-btn {
      background: rgba(180,25,36,0.10);
      box-shadow: 0 12px 32px -8px rgba(44,47,48,0.08);
    }

    .choice-icon {
      width: 64px; height: 64px;
      border-radius: 9999px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: clamp(12px,2vh,24px);
    }
    .truth-btn .choice-icon {
      background: #004be2;
      box-shadow: 0 10px 15px -3px rgba(0,75,226,0.30), 0 4px 6px -4px rgba(0,75,226,0.30);
    }
    .dare-btn .choice-icon {
      background: #b41924;
      box-shadow: 0 10px 15px -3px rgba(180,25,36,0.30), 0 4px 6px -4px rgba(180,25,36,0.30);
    }
    .choice-icon img { width: 24px; height: 24px; display: block; }

    .choice-label {
      font-weight: 700;
      font-size: clamp(20px,3.5vw,24px);
      line-height: 1.35;
      text-align: center;
      margin-bottom: 8px;
    }
    .truth-btn .choice-label { color: #004be2; }
    .dare-btn  .choice-label { color: #b41924; }

    .choice-sub {
      font-weight: 500;
      font-size: 13px;
      line-height: 17px;
      text-align: center;
      color: #2e2e2e;
    }

    /* ═══════════════════════════════════════
       SCREEN 3
    ═══════════════════════════════════════ */
    #s3 { background: #f5f6f8; }

    .s3-body {
      flex: 1;
      min-height: 0;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
    }

    .s3-top {
      display: flex;
      flex-direction: column;
      gap: clamp(16px,3vh,36px);
      align-items: center;
    }

    .prompt-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    .prompt-card {
      border-radius: 48px;
      padding: 40px 32px 80px;
      width: 100%;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }
    .prompt-card.truth-card {
      background: #004be2;
      box-shadow: 0 25px 50px -12px rgba(0,75,226,0.20);
    }
    .prompt-card.dare-card {
      background: #b41924;
      box-shadow: 0 25px 50px -12px rgba(180,25,36,0.20);
    }

    .prompt-text {
      font-weight: 700;
      font-size: clamp(22px,4vw,30px);
      line-height: 1.35;
      color: #ffffff;
    }

    .another-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
      flex-shrink: 0;
    }

    .another-btn {
      width: clamp(240px,70vw,272px);
      padding: clamp(14px,2.2vh,20px) 24px;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: clamp(15px,2.5vw,18px);
      color: #ffffff;
      transition: transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .another-btn:active { transform: scale(0.96); }
    .another-btn img { width: 24px; height: 24px; display: block; flex-shrink: 0; }

    .another-btn.truth-ab {
      background: #004be2;
      box-shadow: 0 20px 25px -5px rgba(0,75,226,0.30), 0 8px 10px -6px rgba(0,75,226,0.30);
    }
    .another-btn.dare-ab {
      background: #b41924;
      box-shadow: 0 20px 25px -5px rgba(180,25,36,0.30), 0 8px 10px -6px rgba(180,25,36,0.30);
    }

    .toggle-row { width: 100%; flex-shrink: 0; }

    .toggle-track {
      background: #ebebeb;
      border-radius: 9999px;
      padding: 8px;
      display: flex;
      gap: 4px;
    }

    .tog-btn {
      flex: 1;
      padding: clamp(12px,1.8vh,16px) 24px;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      background: transparent;
      color: #595c5d;
      transition: background 0.18s, color 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .tog-btn img { width: 16px; height: 16px; display: block; flex-shrink: 0; }
    .tog-btn.tog-truth.on { background: #004be2; color: #ffffff; }
    .tog-btn.tog-dare.on  { background: #b41924; color: #ffffff; }

    /* ═══════════════════════════════════════
       HISTORY "COMING SOON" SHEET
    ═══════════════════════════════════════ */
    .coming-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease;
    }
    .coming-overlay.visible {
      pointer-events: all;
      opacity: 1;
    }

    .coming-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
    }

    .coming-sheet {
      position: relative;
      width: 390px;
      background: #ffffff;
      border-radius: 32px 32px 0 0;
      padding: 28px 28px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.34,1.26,0.64,1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
    }
    .coming-overlay.visible .coming-sheet {
      transform: translateY(0);
    }

    .coming-pill {
      width: 40px; height: 4px;
      background: #e0e0e0;
      border-radius: 9999px;
      margin-bottom: 4px;
    }

    .coming-icon-wrap {
      width: 72px; height: 72px;
      border-radius: 9999px;
      background: rgba(26,186,255,0.10);
      display: flex; align-items: center; justify-content: center;
    }
    .coming-icon-wrap img { width: 32px; height: 32px; display: block; }

    .coming-title {
      font-weight: 800;
      font-size: 22px;
      color: #242424;
      text-align: center;
      letter-spacing: -0.3px;
    }

    .coming-sub {
      font-weight: 500;
      font-size: 15px;
      line-height: 24px;
      color: #7a7a7a;
      text-align: center;
      max-width: 280px;
    }

    .coming-badge {
      background: rgba(26,186,255,0.10);
      color: #1abaff;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 9999px;
    }

    .coming-close {
      margin-top: 4px;
      width: 100%;
      padding: 16px;
      border-radius: 9999px;
      border: none;
      background: #f3f3f3;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: #4e4e4e;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
    }
    .coming-close:active { background: #e8e8e8; }
  </style>
</head>
<body>
<div class="app">

  <!-- ══════════════ SCREEN 1 ══════════════ -->
  <div id="s1" class="screen active">
    <header class="header">
      <div class="logo">Truthly</div>
      <button class="icon-btn" onclick="showComing()" aria-label="History">
        <img src="Icon/History.svg" alt="history" />
      </button>
    </header>

    <div class="s1-body">
      <div class="hero">
        <div class="hero-title">Set the <b>Vibe</b>.</div>
        <div class="hero-sub">Choose your scenario to tailor the perfect session for your group</div>
      </div>

      <div class="cards">
        <button class="card-btn ice" onclick="pickScenario('ice')">
          <div class="card-icon">
            <img src="Icon/Snow.svg" alt="ice break" style="width:25px;height:25px;" />
          </div>
          <div class="card-info">
            <div class="card-name">Ice Break</div>
            <div class="card-desc">Shatter the awkwardness</div>
          </div>
        </button>

        <button class="card-btn party" onclick="pickScenario('party')">
          <div class="card-icon">
            <img src="Icon/Party.svg" alt="party" />
          </div>
          <div class="card-info">
            <div class="card-name">Party</div>
            <div class="card-desc">Get ready for something wild</div>
          </div>
        </button>

        <button class="card-btn deep" onclick="pickScenario('deep')">
          <div class="card-icon">
            <img src="Icon/Deep%20talk.svg" alt="deep talk" />
          </div>
          <div class="card-info">
            <div class="card-name">Deep Talk</div>
            <div class="card-desc">Soul-searching connection</div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════ SCREEN 2 ══════════════ -->
  <div id="s2" class="screen">
    <header class="header">
      <button class="icon-btn" onclick="goTo('s1')" aria-label="Back">
        <img src="Icon/Back.svg" alt="back" />
      </button>
      <div class="logo">Truthly</div>
      <button class="icon-btn" onclick="showComing()" aria-label="History">
        <img src="Icon/History.svg" alt="history" />
      </button>
    </header>

    <div class="s2-body">
      <div class="s2-hero">
        <div id="s2-pill" class="cat-pill" style="color:#1abaff;border-color:#1abaff">ICE BREAK</div>
        <div class="s2-title">What's it <b>going to be?</b></div>
        <div class="s2-sub">Tap to choose your fate. One leads to revelation, the other to action</div>
      </div>

      <div class="choice-row">
        <button class="choice-btn truth-btn" onclick="pickType('truth')">
          <div class="choice-icon">
            <img src="Icon/Truth.svg" alt="truth" />
          </div>
          <div class="choice-label">Truth</div>
          <div class="choice-sub">Honest answers only</div>
        </button>

        <button class="choice-btn dare-btn" onclick="pickType('dare')">
          <div class="choice-icon">
            <img src="Icon/Dare.svg" alt="dare" />
          </div>
          <div class="choice-label">Dare</div>
          <div class="choice-sub">Challenge accepted</div>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════ SCREEN 3 ══════════════ -->
  <div id="s3" class="screen">
    <header class="header">
      <button class="icon-btn" onclick="goTo('s1')" aria-label="Back">
        <img src="Icon/Back.svg" alt="back" />
      </button>
      <div class="logo">Truthly</div>
      <button class="icon-btn" onclick="showComing()" aria-label="History">
        <img src="Icon/History.svg" alt="history" />
      </button>
    </header>

    <div class="s3-body">
      <div class="s3-top">
        <div class="prompt-wrap">
          <div id="s3-pill" class="cat-pill" style="color:#1abaff;border-color:#1abaff">ICE BREAK</div>
          <div id="prompt-card" class="prompt-card truth-card">
            <div id="prompt-text" class="prompt-text"></div>
          </div>
        </div>

        <div class="another-wrap">
          <button id="another-btn" class="another-btn truth-ab" onclick="nextPrompt()">
            ANOTHER ONE
            <img id="reload-img" src="Icon/Reload.svg" alt="reload" />
          </button>
        </div>
      </div>

      <div class="toggle-row">
        <div class="toggle-track">
          <button id="tog-t" class="tog-btn tog-truth on" onclick="switchType('truth')">
            <img id="tog-t-img" src="Icon/Truth.svg" alt="truth" style="filter: brightness(0) invert(1);" />
            TRUTH
          </button>
          <button id="tog-d" class="tog-btn tog-dare" onclick="switchType('dare')">
            <img id="tog-d-img" src="Icon/Dare.svg" alt="dare" style="filter: brightness(0) invert(1) brightness(0.35);" />
            DARE
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════ COMING SOON SHEET ══════════════ -->
  <div id="coming-overlay" class="coming-overlay" onclick="handleOverlayClick(event)">
    <div class="coming-backdrop"></div>
    <div class="coming-sheet">
      <div class="coming-pill"></div>
      <div class="coming-icon-wrap">
        <img src="Icon/History.svg" alt="history" />
      </div>
      <div class="coming-badge">Coming Soon</div>
      <div class="coming-title">History</div>
      <button class="coming-close" onclick="hideComing()">Got it!</button>
    </div>
  </div>

</div><!-- .app -->

<script>
  /* ── ICON URLS for dynamic toggle ── */
  const ICON = {
    heart_on:  'Icon/Truth.svg',  // used for both states
    heart_off: 'Icon/Truth.svg',
    fire_on:   'Icon/Dare.svg',   // used for both states
    fire_off:  'Icon/Dare.svg',
    reload:    'Icon/Reload.svg',
  };

  /* ── DATA ── */
  const PROMPTS = {
    ice: {
      truth: [
        "What's the most recent thing you've learned?",
        "What's your favorite thing to do on weekends?",
        "What was your dream job as a kid?",
        "What app do you use the most?",
        "What's your favorite season?",
        "Do you have any pets?",
        "What's your favorite meal?",
        "What's the happiest thing that happened to you recently?",
        "Do you prefer alone time or socializing?",
        "What's the last movie you watched?",
        "What's your favorite city?",
        "What kind of music do you usually listen to?",
        "What's your favorite book?",
        "Where did you go on your last trip?",
        "Are you more of an early bird or a night owl?",
        "Do you have any weird little habits?",
        "What's your favorite weather?",
        "What's your favorite holiday?",
        "Can you cook? What's your best dish?",
        "What show are you watching right now?",
        "What's your favorite sport?",
        "Do you prefer the beach or the mountains?",
        "What were you most afraid of as a kid?",
        "What's one skill you really want to learn right now?",
        "What's your favorite drink?",
        "What was your most recent impulse purchase?",
        "What's your favorite color?",
        "Do you have a consistent daily routine?",
        "Are you a cat person or a dog person?",
        "Describe your mood right now in one word.",
        "What superpower would you most want to have?",
        "How do you like to relax?",
        "What's your favorite snack?",
        "How many languages can you speak?",
        "What's one thing you absolutely can't stand?",
        "What does your ideal vacation look like?",
        "Do you have a role model or idol?",
        "What kind of movies do you enjoy most?",
        "What do you do to de-stress?",
        "Do you have any special collecting habits?",

        "Delete something from your phone you've held onto for too long.",
        "Rate how you're doing today out of 10 — and be honest about why.",
        "Tear up a piece of paper as a symbol of something you're ready to release.",
        "Take a photo of this moment and describe why you want to remember it.",
        "Say the one sentence that most honestly captures your state right now.",
        "Send a message to a family member you want to express gratitude to.",
        "Share one thought you rarely get to say out loud.",
        "Find a recent moment that moved you — and share it with the group.",
        "Name one area of your life where you can see yourself growing.",
        "Write the opening line of a letter to yourself five years from now.",
        "Say one emotion — raw, unedited, without dressing it up.",
        "Find the oldest photo on your phone and tell its story.",
        "Share one truth about yourself that only you really know.",
        "Tell the person next to you something genuine they don't know you feel.",
        "Make a public commitment to one small thing you'll do before the day is over.",
        "Talk about something you've been waiting for without knowing what you're waiting for.",
        "Complete this sentence out loud: 'What I truly want right now is...'",
        "Find something you saved but never looked at — explain why you kept it.",
        "Name one genuinely kind thing you could do for yourself today.",
        "In one sentence, describe how you've been — no sugarcoating.",
        "Share one moment that has made you feel like your life has meaning.",
        "Set one small evening ritual for yourself starting tonight.",
        "Say one honest thing to everyone in this room.",
        "Show everyone the last voice note or voice memo on your phone.",
        "Write down one fear you've never admitted to anyone.",
        "Share the last song you listened to and explain the mood behind it.",
        "Name one small thing you could do this week that would make you proud.",
        "Say out loud something you've been holding back in this conversation.",
        "Find the most recent happy memory on your camera roll and share it.",
        "Write one word that describes where you are in life right now.",
        "Say what you wish someone had told you five years ago.",
        "Share one thing in your life that feels unfinished.",
        "Describe in one sentence what you're hoping for from this stage of your life.",
        "Pick someone in the room and tell them one thing you genuinely respect about them.",
        "Say what you're most afraid people would think if they truly knew you.",
        "Write down the name of one person you want to reconnect with.",
        "Close your eyes for 10 seconds, breathe, then say one true thing.",
      ],
    },
  };

  const LABELS  = { ice: 'Ice Break', party: 'Party', deep: 'Deep Talk' };
  const COLORS  = { ice: '#1abaff',   party: '#ffa617', deep: '#7d44d1'  };

  /* ── STATE ── */
  let S = {
    scenario: 'ice',
    type: 'truth',
    used: {
      ice:   { truth: [], dare: [] },
      party: { truth: [], dare: [] },
      deep:  { truth: [], dare: [] },
    },
  };

  /* ── NAVIGATION ── */
  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  /* ── SCENARIO → S2 ── */
  function pickScenario(scenario) {
    S.scenario = scenario;
    const pill = document.getElementById('s2-pill');
    pill.textContent      = LABELS[scenario].toUpperCase();
    pill.style.color       = COLORS[scenario];
    pill.style.borderColor = COLORS[scenario];
    goTo('s2');
  }

  /* ── TYPE → S3 ── */
  function pickType(type) {
    S.type = type;
    applyS3(getPrompt());
    goTo('s3');
  }

  /* ── NEXT PROMPT ── */
  function nextPrompt() {
    animCard(() => applyS3(getPrompt()));
  }

  /* ── SWITCH TYPE ── */
  function switchType(type) {
    if (S.type === type) return;
    S.type = type;
    animCard(() => applyS3(getPrompt()));
  }

  /* ── HELPERS ── */
  function getPrompt() {
    const pool  = PROMPTS[S.scenario][S.type];
    const used  = S.used[S.scenario][S.type];
    let avail   = pool.filter(p => !used.includes(p));
    if (!avail.length) { S.used[S.scenario][S.type] = []; avail = [...pool]; }
    const chosen = avail[Math.floor(Math.random() * avail.length)];
    S.used[S.scenario][S.type].push(chosen);
    return chosen;
  }

  function animCard(fn) {
    const card = document.getElementById('prompt-card');
    card.style.opacity   = '0';
    card.style.transform = 'translateY(10px) scale(0.98)';
    setTimeout(() => { fn(); card.style.opacity = '1'; card.style.transform = ''; }, 160);
  }

  function applyS3(prompt) {
    const isT = S.type === 'truth';
    const col  = COLORS[S.scenario];
    const lbl  = LABELS[S.scenario];

    const pill = document.getElementById('s3-pill');
    pill.textContent       = lbl.toUpperCase();
    pill.style.color        = col;
    pill.style.borderColor  = col;

    document.getElementById('prompt-text').textContent = prompt;
    document.getElementById('prompt-card').className   = 'prompt-card ' + (isT ? 'truth-card' : 'dare-card');
    document.getElementById('another-btn').className   = 'another-btn ' + (isT ? 'truth-ab' : 'dare-ab');

    /* toggle buttons */
    document.getElementById('tog-t').className = 'tog-btn tog-truth' + (isT ? ' on' : '');
    document.getElementById('tog-d').className = 'tog-btn tog-dare'  + (isT ? '' : ' on');

    /* toggle icons — same SVG for both states, CSS filter controls color */
    const tImg = document.getElementById('tog-t-img');
    const dImg = document.getElementById('tog-d-img');
    tImg.src = ICON.heart_on;
    dImg.src = ICON.fire_on;
    // active → white (brightness(0) invert(1)); inactive → grey #595C5D (brightness(0) invert(1) brightness(0.35))
    tImg.style.filter = isT ? 'brightness(0) invert(1)' : 'brightness(0) invert(1) brightness(0.35)';
    dImg.style.filter = isT ? 'brightness(0) invert(1) brightness(0.35)' : 'brightness(0) invert(1)';
  }

  /* ── COMING SOON SHEET ── */
  function showComing() {
    document.getElementById('coming-overlay').classList.add('visible');
  }
  function hideComing() {
    document.getElementById('coming-overlay').classList.remove('visible');
  }
  function handleOverlayClick(e) {
    if (e.target === document.querySelector('.coming-backdrop')) hideComing();
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
